<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TechStore | Catálogo de Software</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <button class="menu-toggle" id="menuToggle" aria-label="Abrir menú">☰</button>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-content">
      <div class="sidebar-header">
        <h3>⚡ Panel Control</h3>
      </div>
      
      <div class="sidebar-section">
        <h4>❤️ Donaciones</h4>
        <div class="qr-container">
          <img src="recursos/qr.jpg" alt="QR Transfer" class="qr-image" onerror="this.parentElement.innerHTML='<div class=\'qr-err\'>📱<br>QR Offline</div>'">
        </div>
        <button class="btn-qr-view" onclick="window.open('recursos/qr.jpg', '_blank')">Ampliar QR</button>
      </div>
      
      <div class="sidebar-section">
        <h4>💬 Contacto</h4>
        <a href="#" class="nav-link wa">WhatsApp</a>
        <a href="#" class="nav-link tg">Telegram</a>
      </div>
      
      <div class="sidebar-footer">
        <p>© 2026 TechStore</p>
      </div>
    </div>
  </aside>

  <main class="main-wrapper">
    <header class="page-header">
      <div class="header-content">
        <span class="badge">Sistemas & Electrónica</span>
        <h1>Catálogo de <span>Apps</span></h1>
        <p>Herramientas de software especializado para optimizar tu trabajo.</p>
      </div>
    </header>

    <div class="container">
      <div class="apps-grid" id="appsContainer">
        <div class="loading-state">
          <div class="spinner"></div>
          <p>Sincronizando base de datos...</p>
        </div>
      </div>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
